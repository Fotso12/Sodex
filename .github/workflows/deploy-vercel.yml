name: Déploiement Monorepo

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint — ${{ matrix.project.name }}
    strategy:
      fail-fast: false
      matrix:
        project:
          - name: Sodex
            dir: sodex
          - name: Dooke Corporation
            dir: dooke-corporation
          - name: Dooke Works
            dir: dooke-works
          - name: Dooke Consulting
            dir: dooke-consulting

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: ${{ matrix.project.dir }}/package-lock.json

      - name: Installation des dépendances
        working-directory: ${{ matrix.project.dir }}
        run: npm ci

      - name: Lint
        working-directory: ${{ matrix.project.dir }}
        run: npm run lint

  security:
    name: Security — ${{ matrix.project.name }}
    strategy:
      fail-fast: false
      matrix:
        project:
          - name: Sodex
            dir: sodex
          - name: Dooke Corporation
            dir: dooke-corporation
          - name: Dooke Works
            dir: dooke-works
          - name: Dooke Consulting
            dir: dooke-consulting

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: ${{ matrix.project.dir }}/package-lock.json

      - name: Scan des vulnérabilités (npm audit)
        working-directory: ${{ matrix.project.dir }}
        run: npm audit --audit-level=high
        continue-on-error: true

  deploy:
    name: Deploy — ${{ matrix.project.name }}
    needs: [lint, security]
    strategy:
      fail-fast: false
      matrix:
        project:
          - name: Sodex
            dir: sodex
            secret: VERCEL_PROJECT_ID
          - name: Dooke Corporation
            dir: dooke-corporation
            secret: VERCEL_PROJECT_ID_CORPORATION
          - name: Dooke Works
            dir: dooke-works
            secret: VERCEL_PROJECT_ID_WORKS
          - name: Dooke Consulting
            dir: dooke-consulting
            secret: VERCEL_PROJECT_ID_CONSULTING

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: ${{ matrix.project.dir }}/package-lock.json

      - name: Installation des dépendances
        working-directory: ${{ matrix.project.dir }}
        run: npm ci

      - name: Installation de Vercel CLI
        run: npm install -g vercel@latest

      - name: Récupération de la config Vercel
        run: vercel pull --yes --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets[matrix.project.secret] }}

      - name: Build avec Vercel
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets[matrix.project.secret] }}

      - name: Déploiement
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets[matrix.project.secret] }}
